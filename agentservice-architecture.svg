<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 520" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="layer1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f3460"/>
      <stop offset="100%" stop-color="#1a5276"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1b4f72"/>
      <stop offset="100%" stop-color="#2471a3"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a5276"/>
      <stop offset="100%" stop-color="#2e86c1"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f618d"/>
      <stop offset="100%" stop-color="#3498db"/>
    </linearGradient>
    <linearGradient id="layer5" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#e74c3c"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="520" rx="12" fill="#f8f9fa"/>

  <!-- Title -->
  <rect x="20" y="15" width="680" height="44" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="360" y="43" text-anchor="middle" fill="white" font-size="18" font-weight="700" letter-spacing="0.5">AgentService Architecture</text>

  <!-- Incoming arrow -->
  <text x="360" y="82" text-anchor="middle" fill="#555" font-size="12" font-weight="600">Goal Request</text>
  <line x1="360" y1="88" x2="360" y2="105" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#888"/></marker></defs>

  <!-- Layer 1: Goal Interface -->
  <rect x="40" y="108" width="640" height="56" rx="8" fill="url(#layer1)" filter="url(#shadow)"/>
  <rect x="48" y="116" width="8" height="40" rx="4" fill="#e8d44d"/>
  <text x="72" y="133" fill="#e8d44d" font-size="11" font-weight="700" letter-spacing="1">LAYER 1</text>
  <text x="72" y="152" fill="white" font-size="15" font-weight="600">Goal Interface</text>
  <text x="540" y="140" text-anchor="end" fill="#aab" font-size="11">POST /pricing/evaluate</text>
  <text x="668" y="140" text-anchor="end" fill="#7a8" font-size="11" font-style="italic">agent.py</text>

  <!-- Arrow -->
  <line x1="360" y1="164" x2="360" y2="178" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 2: Reasoning Engine -->
  <rect x="40" y="181" width="640" height="96" rx="8" fill="url(#layer2)" filter="url(#shadow)"/>
  <rect x="48" y="189" width="8" height="80" rx="4" fill="#e8d44d"/>
  <text x="72" y="206" fill="#e8d44d" font-size="11" font-weight="700" letter-spacing="1">LAYER 2</text>
  <text x="72" y="225" fill="white" font-size="15" font-weight="600">Reasoning Engine</text>
  <text x="668" y="206" text-anchor="end" fill="#7a8" font-size="11" font-style="italic">agent.py</text>

  <!-- Reasoning loop box -->
  <rect x="80" y="237" width="560" height="32" rx="5" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="100" y="258" fill="#cde" font-size="11">Assess needed data  &#8594;  Call tool (L3)  &#8594;  Interpret result  &#8594;  Need more?  &#8594;  Synthesize answer</text>

  <!-- Two-way arrow to Layer 3 -->
  <line x1="280" y1="277" x2="280" y2="295" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="295" x2="440" y2="277" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 3: Tool Registry -->
  <rect x="40" y="298" width="400" height="72" rx="8" fill="url(#layer3)" filter="url(#shadow)"/>
  <rect x="48" y="306" width="8" height="56" rx="4" fill="#e8d44d"/>
  <text x="72" y="323" fill="#e8d44d" font-size="11" font-weight="700" letter-spacing="1">LAYER 3</text>
  <text x="72" y="342" fill="white" font-size="15" font-weight="600">Tool Registry</text>
  <text x="428" y="323" text-anchor="end" fill="#7a8" font-size="11" font-style="italic">tools.py</text>
  <text x="72" y="360" fill="#9bc" font-size="10">get_base_price | check_volume_discount | get_customer_history</text>

  <!-- Layer 4: Domain Memory (right side, same row as Layer 3) -->
  <rect x="460" y="298" width="220" height="72" rx="8" fill="url(#layer4)" filter="url(#shadow)"/>
  <rect x="468" y="306" width="8" height="56" rx="4" fill="#e8d44d"/>
  <text x="492" y="323" fill="#e8d44d" font-size="11" font-weight="700" letter-spacing="1">LAYER 4</text>
  <text x="492" y="342" fill="white" font-size="15" font-weight="600">Domain Memory</text>
  <text x="668" y="323" text-anchor="end" fill="#7a8" font-size="11" font-style="italic">memory.py</text>
  <text x="492" y="360" fill="#9bc" font-size="10">Interactions | Decisions | Patterns</text>

  <!-- Arrow from Layer 2 to Layer 4 -->
  <line x1="570" y1="277" x2="570" y2="295" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Arrow down from layers 3+4 -->
  <line x1="360" y1="370" x2="360" y2="390" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Layer 5: Safety Boundaries -->
  <rect x="40" y="393" width="640" height="56" rx="8" fill="url(#layer5)" filter="url(#shadow)"/>
  <rect x="48" y="401" width="8" height="40" rx="4" fill="#f9e654"/>
  <text x="72" y="418" fill="#f9e654" font-size="11" font-weight="700" letter-spacing="1">LAYER 5</text>
  <text x="72" y="437" fill="white" font-size="15" font-weight="600">Safety Boundaries</text>
  <text x="668" y="418" text-anchor="end" fill="#faa" font-size="11" font-style="italic">safety.py</text>
  <text x="350" y="437" fill="#fdd" font-size="10">Max 35% discount | Margin floor | $10K escalation | Loop limits | Authority scope</text>

  <!-- Arrow down to response -->
  <line x1="360" y1="449" x2="360" y2="470" stroke="#888" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Response -->
  <rect x="120" y="473" width="480" height="34" rx="8" fill="url(#headerGrad)" filter="url(#shadow)"/>
  <text x="360" y="495" text-anchor="middle" fill="white" font-size="12" font-weight="600">Response: price + reasoning + tools_used + confidence + trajectory + approval_status</text>

  <!-- Side annotation: Safety checks at each step -->
  <line x1="680" y1="240" x2="680" y2="420" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="675" y1="240" x2="680" y2="240" stroke="#e74c3c" stroke-width="1.5"/>
  <line x1="675" y1="420" x2="680" y2="420" stroke="#e74c3c" stroke-width="1.5"/>
  <text x="696" y="335" fill="#c0392b" font-size="10" font-weight="600" transform="rotate(90, 696, 335)">Safety at each step</text>
</svg>
